<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>MastoGale 登录</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e2030, #0f1015);
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            transform: translateY(0);
            transition: all 0.3s ease;
        }
        .container:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.12);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 700;
        }
        h1 span {
            color: #6366f1;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .input-row input[type="text"] {
            flex: 2;
        }
        .input-row select {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 12px 16px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .input-row select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .input-row select option {
            background: #1e2030;
            color: #f0f0f5;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        button:hover {
            background: #4f46e5;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #10b981;
            min-height: 20px;
        }
        .status-msg.error {
            color: #ef4444;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PREFiX<span>-Mastodon</span></h1>
        <p>简洁、易用的长毛象客户端</p>
        
        <div id="login-form">
            <div class="input-group">
                <label for="instance-input">长毛象实例地址</label>
                <div class="input-row">
                    <input type="text" id="instance-input" placeholder="例如: mastodon.social" value="mastodon.social" />
                    <select id="instance-select">
                        <option value="mastodon.social">mastodon.social</option>
                        <option value="mast.dragon-fly.club">mast.dragon-fly.club</option>
                        <option value="m.cmx.im">m.cmx.im</option>
                    </select>
                </div>
            </div>
            <button id="auth-btn">开始授权</button>
        </div>

        <div id="status-container" style="display:none;">
            <div class="loader"></div>
            <span id="status-text">正在连接实例...</span>
        </div>

        <div id="manual-code-container" style="display:none; margin-top: 20px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px; text-align: left;">
            <div class="input-group">
                <label for="manual-code-input" style="color: #a7f3d0; font-size: 11px;">已打开授权页面！若未自动完成，请在此粘贴授权码：</label>
                <input type="text" id="manual-code-input" placeholder="请在此粘贴复制的授权码..." />
            </div>
            <button id="manual-login-btn" style="background: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25); margin-top: 10px;">确认登录</button>
        </div>

        <div id="msg" class="status-msg"></div>
    </div>

    <!-- Load scripts in order -->
    <script src="js/lib/mastodon.js"></script>
    <script src="js/lib/ripple.helpers.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
